name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint and Typecheck (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test dependencies
        run: python -m pip install -e ".[test]"

      - name: Run Ruff
        run: python -m ruff check .

      - name: Run mypy
        run: python -m mypy

  focused-regressions:
    name: Focused Regressions
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: python -m pip install -e ".[test]"

      - name: Run focused public and metadata regressions
        run: python -m pytest tests/test_public_api.py tests/test_public_smoke.py tests/test_package_metadata.py -q

  full-test-suite:
    name: Full Test Suite (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: focused-regressions
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test dependencies
        run: python -m pip install -e ".[test]"

      - name: Run full pytest suite
        run: python -m pytest -q