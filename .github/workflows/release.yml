name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify-release:
    name: Release Validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: python -m pip install -e ".[test]"

      - name: Run repository-owned release gate
        run: python scripts/release_check.py

  build-distributions:
    name: Build Distributions
    runs-on: ubuntu-latest
    needs: verify-release

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: python -m pip install build

      - name: Build wheel and source distribution
        run: python -m build

      - name: Validate staged distribution artifacts
        run: python scripts/package_check.py --dist-dir dist

      - name: Generate release artifact manifest
        run: python scripts/release_artifact_manifest.py --dist-dir dist --output dist/release-artifact-manifest.json

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-distributions
          path: dist/*

  publish-github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-distributions
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-distributions
          path: dist

      - name: Verify release artifact manifest
        run: python scripts/release_artifact_manifest.py --dist-dir dist --manifest dist/release-artifact-manifest.json --verify

      - name: Generate release promotion summary
        run: python scripts/release_promotion_summary.py --dist-dir dist --manifest dist/release-artifact-manifest.json --tag ${{ github.ref_name }} --commit-sha ${{ github.sha }} --output dist/release-promotion-summary.json

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'a') || contains(github.ref_name, 'b') || contains(github.ref_name, 'rc') }}

      - name: Verify published GitHub release assets and checksums
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/release_published_assets_check.py --repository ${{ github.repository }} --tag ${{ github.ref_name }} --dist-dir dist --api-base-url ${{ github.api_url }}