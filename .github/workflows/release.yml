name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-release:
    name: Release Validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: python -m pip install -e ".[test]"

      - name: Run Ruff
        run: python -m ruff check .

      - name: Run mypy
        run: python -m mypy

      - name: Run focused public and metadata regressions
        run: python -m pytest tests/test_public_api.py tests/test_public_smoke.py tests/test_package_metadata.py -q

      - name: Validate built package artifacts
        run: python scripts/package_check.py

      - name: Run full pytest suite
        run: python -m pytest -q

  build-distributions:
    name: Build Distributions
    runs-on: ubuntu-latest
    needs: verify-release

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: python -m pip install build

      - name: Build wheel and source distribution
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-distributions
          path: dist/*

  publish-github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-distributions
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-distributions
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true